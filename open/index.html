<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OUTSIIDE — Open in App</title>
<meta name="description" content="Discover events and experiences near you with OUTSIIDE. Redirecting to the app store.">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="shortcut icon" href="/assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  color-scheme:dark;
  --bg:#050505;--text:#f5f5f5;--muted:rgba(245,245,245,.68);
  --card:rgba(255,255,255,.06);--border:rgba(255,255,255,.10);--border-light:rgba(255,255,255,.06);
  --ghost:rgba(255,255,255,.07);--accent:#c6f221;--accent-dim:rgba(198,242,33,.15);
  --accent-border:rgba(198,242,33,.30);--radius-sm:14px;--radius-md:22px;--radius-lg:28px;--radius-pill:999px;
  --shadow-card:0 24px 64px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.05);
  --transition:200ms cubic-bezier(.4,0,.2,1);
}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:var(--text);
  background:linear-gradient(rgba(0,0,0,.58),rgba(0,0,0,.72)),url("/assets/outsiide-bg.jpg") center/cover no-repeat fixed,var(--bg);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:40px 20px;line-height:1.6;
}
a{color:var(--accent);text-decoration:none;transition:opacity var(--transition)}
a:hover{opacity:.8}

.card{
  width:100%;max-width:600px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);padding:48px 40px;text-align:center;
}
.logo{width:120px;margin-bottom:24px;filter:drop-shadow(0 4px 24px rgba(0,0,0,.5))}

.badge{
  display:inline-block;padding:7px 18px;border-radius:var(--radius-pill);font-size:.8rem;font-weight:600;
  border:1px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);
  margin-bottom:20px;letter-spacing:.02em;
}

h1{font-size:1.75rem;font-weight:700;letter-spacing:-.03em;margin-bottom:12px;line-height:1.2}
.lead{color:var(--muted);font-size:.94rem;margin-bottom:28px}

.screenshots{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.screenshots img{
  width:100%;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--card);box-shadow:0 8px 32px rgba(0,0,0,.3);
  transition:transform var(--transition),box-shadow var(--transition);
}
.screenshots img:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.45)}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 30px;border-radius:var(--radius-pill);font-family:inherit;font-size:.92rem;
  font-weight:600;cursor:pointer;transition:all var(--transition);border:none;text-decoration:none;
}
.btn.primary{background:var(--accent);color:#000}
.btn.primary:hover{box-shadow:0 6px 24px rgba(198,242,33,.3);transform:translateY(-2px)}

.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

.continue{
  display:inline-block;margin-top:20px;color:var(--muted);font-size:.88rem;font-weight:500;
  transition:color var(--transition);
}
.continue:hover{color:var(--text);opacity:1}
</style>
</head>
<body>
<div class="card">
  <img src="/assets/outsiide-logo.png" alt="OUTSIIDE" class="logo">
  <div class="badge">Opening OUTSIIDE…</div>
  <h1>Discover what's happening around you.</h1>
  <p class="lead">If OUTSIIDE is not installed, you'll be redirected to the app store shortly.</p>

  <div class="screenshots">
    <img src="/assets/screenshot-1.png" alt="OUTSIIDE Screenshot 1" loading="lazy">
    <img src="/assets/screenshot-2.png" alt="OUTSIIDE Screenshot 2" loading="lazy">
    <img src="/assets/screenshot-3.png" alt="OUTSIIDE Screenshot 3" loading="lazy">
  </div>

  <div class="actions">
    <a href="https://apps.apple.com/ca/app/outsiide/id6758898068" class="btn primary" id="btn-ios"> App Store</a>
    <a href="https://play.google.com/store/apps/details?id=ca.outsiide.mobile&hl=en_CA" class="btn primary" id="btn-android"> Google Play</a>
  </div>

  <a href="https://outsiide.ca" class="continue">Continue on Website →</a>
</div>

<script>
(function(){
  var ua=navigator.userAgent||navigator.vendor||window.opera;
  var ios=/iPad|iPhone|iPod/.test(ua)&&!window.MSStream;
  var android=/android/i.test(ua);
  var url=ios
    ?'https://apps.apple.com/ca/app/outsiide/id6758898068'
    :android
      ?'https://play.google.com/store/apps/details?id=ca.outsiide.mobile&hl=en_CA'
      :null;
  if(url){setTimeout(function(){window.location.href=url},1500)}
})();
</script>
</body>
</html>
