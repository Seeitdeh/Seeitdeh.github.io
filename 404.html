<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Outsiide</title>

  <!-- Generic preview. GitHub Pages is static, so shared links cannot show a
       per-post Open Graph card (accepted trade-off). -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Outsiide" />
  <meta property="og:description" content="Discover events and experiences near you." />
  <meta property="og:url" content="https://outsiide.ca" />

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #000; color: #fff; padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card { max-width: 360px; width: 100%; text-align: center; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #b3b3b3; margin: 0 0 24px; font-size: 15px; }
    a.btn {
      display: block; width: 100%; padding: 14px 20px; border-radius: 12px; margin: 10px 0;
      font-size: 16px; font-weight: 600; text-decoration: none;
      background: #1c1c1e; color: #fff; border: 1px solid #2c2c2e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Open in Outsiide</h1>
    <p>Get the app to view this on Outsiide.</p>
    <a class="btn" id="appStore" href="https://apps.apple.com/ca/app/outsiide/id6758898068">Download on the App Store</a>
    <a class="btn" id="playStore" href="https://play.google.com/store/apps/details?id=ca.outsiide.mobile">Get it on Google Play</a>
  </div>

  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || '';
      var isIOS = /iphone|ipad|ipod/i.test(ua);
      var isAndroid = /android/i.test(ua);
      var appStore = 'https://apps.apple.com/ca/app/outsiide/id6758898068';
      var playStore = 'https://play.google.com/store/apps/details?id=ca.outsiide.mobile';
      // If the app is installed, the OS intercepts the link before this page
      // ever loads. Reaching here means it is not installed (or an in-app
      // browser) -> send mobile users to the right store.
      var storeUrl = isIOS ? appStore : isAndroid ? playStore : null;
      if (storeUrl) {
        setTimeout(function () { window.location.href = storeUrl; }, 1500);
      }
    })();
  </script>
</body>
</html>
