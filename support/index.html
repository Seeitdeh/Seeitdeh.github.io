<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OUTSIIDE Support</title>
  <meta name="description" content="Need help with OUTSIIDE? Contact us or send your feedback." />
  <meta name="robots" content="index,follow" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --bg-alt: #f7f7f5;
      --text: #1a1a1a;
      --text-body: #555555;
      --text-muted: #888888;
      --accent: #c6f221;
      --accent-hover: #b5e010;
      --accent-soft: rgba(198,242,33,.12);
      --card-bg: #ffffff;
      --card-shadow: 0 2px 16px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04);
      --border: rgba(0,0,0,.08);
      --border-accent: rgba(198,242,33,.5);
      --radius-sm: 14px;
      --radius-md: 20px;
      --radius-lg: 24px;
      --radius-pill: 999px;
      --transition: 200ms cubic-bezier(.4,0,.2,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      color: var(--text-body);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg-alt);
    }

    h1, h2, h3 { color: var(--text); }

    .card {
      width: min(740px, 100%);
      padding: 40px 32px;
      border-radius: var(--radius-lg);
      background: var(--card-bg);
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
    }

    .top {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      width: min(240px, 60vw);
      display: block;
      margin: 0 auto 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3.4vw, 34px);
      font-weight: 900;
      letter-spacing: -.03em;
    }

    .top p {
      margin: 0;
      line-height: 1.6;
    }

    .supportBox {
      margin-top: 22px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-alt);
      transition: border-color var(--transition);
    }

    .supportBox:hover { border-color: var(--border-accent); }

    .supportBox h2 {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #4a7a00;
    }

    .supportBox a {
      color: var(--text);
      text-decoration: none;
      transition: color var(--transition);
    }

    .supportBox a:hover { color: #4a7a00; }

    form {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-alt);
      color: var(--text);
      font: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input:focus, textarea:focus {
      border-color: var(--border-accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    input::placeholder, textarea::placeholder { color: var(--text-muted); }

    textarea { min-height: 130px; resize: vertical; }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: var(--radius-pill);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      font: inherit;
      font-weight: 700;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn.primary {
      background: var(--accent);
      color: var(--text);
    }

    .btn.primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 6px 24px rgba(198,242,33,.35);
    }

    .btn.ghost {
      background: transparent;
      color: var(--text);
      border-color: var(--text);
    }

    .btn.ghost:hover {
      background: var(--text);
      color: var(--bg);
    }

    .msg {
      margin-top: 8px;
      min-height: 18px;
      font-size: 13px;
      text-align: center;
    }

    .msg.good { color: #2d7a00; }
    .msg.bad { color: #c0392b; }

    .footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--text-body);
      text-decoration: none;
      margin: 0 8px;
      transition: color var(--transition);
    }

    .footer a:hover { color: #4a7a00; }

    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 28px 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn:hover { transform: none; }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="top">
      <img class="logo" src="../assets/outsiide-logo.png" alt="OUTSIIDE logo" />
      <h1>Support</h1>
      <p>Need help with OUTSIIDE? Email us directly or send your feedback below.</p>
    </div>

    <section class="supportBox">
      <h2>Contact</h2>
      <p>Email us at <a href="mailto:info@outsiide.ca">info@outsiide.ca</a></p>
    </section>

    <form id="feedbackForm">
      <div class="row">
        <input id="name" type="text" name="name" placeholder="Your name" autocomplete="name" required />
        <input id="email" type="email" name="email" placeholder="Your email" autocomplete="email" required />
      </div>
      <textarea id="message" name="message" placeholder="Tell us what you think, what needs fixing, or what you'd like to see next." required></textarea>
      <div class="actions">
        <button class="btn primary" id="btn" type="submit">Send Feedback</button>
        <a class="btn ghost" href="/">Back Home</a>
      </div>
      <div id="msg" class="msg" role="status" aria-live="polite"></div>
    </form>

    <div class="footer">
      <a href="/">Home</a>
      <a href="/privacy/">Privacy Policy</a>
      <a href="/terms/">Terms of Service</a>
      <a href="/conditions/">Conditions of Use</a>
      <br /><br />
      &copy; <span id="y"></span> OUTSIIDE
    </div>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    const form = document.getElementById("feedbackForm");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      msg.className = "msg";
      btn.disabled = true;

      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        message: document.getElementById("message").value.trim(),
        source: "outsiide.ca/support",
        timestamp: new Date().toISOString()
      };

      try {
        const res = await fetch("https://formspree.io/f/mzdddzgj", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          form.reset();
          msg.textContent = "Thanks — your feedback has been sent.";
          msg.classList.add("good");
        } else {
          msg.textContent = "Could not submit right now. Please try again.";
          msg.classList.add("bad");
        }
      } catch (err) {
        msg.textContent = "Network error. Please try again.";
        msg.classList.add("bad");
      } finally { btn.disabled = false; }
    });
  </script>
</body>
</html>
