<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OUTSIIDE Support</title>
<meta name="description" content="Need help with OUTSIIDE? Contact us or send your feedback.">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
<link rel="shortcut icon" href="../assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  color-scheme:dark;
  --bg:#050505;--text:#f5f5f5;--muted:rgba(245,245,245,.68);
  --card:rgba(255,255,255,.06);--border:rgba(255,255,255,.10);--border-light:rgba(255,255,255,.06);
  --ghost:rgba(255,255,255,.07);--accent:#c6f221;--accent-dim:rgba(198,242,33,.15);
  --accent-border:rgba(198,242,33,.30);--radius-sm:14px;--radius-md:22px;--radius-lg:28px;--radius-pill:999px;
  --shadow-card:0 24px 64px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.05);
  --transition:200ms cubic-bezier(.4,0,.2,1);
}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:var(--text);
  background:linear-gradient(rgba(0,0,0,.58),rgba(0,0,0,.72)),url("../assets/outsiide-bg.jpg") center/cover no-repeat,var(--bg);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:40px 20px;line-height:1.6;
}
a{color:var(--accent);text-decoration:none;transition:opacity var(--transition)}
a:hover{opacity:.8}

.card{
  width:100%;max-width:560px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);padding:48px 40px;text-align:center;
}
.logo{width:120px;margin-bottom:28px;filter:drop-shadow(0 4px 24px rgba(0,0,0,.5))}
h1{font-size:1.75rem;font-weight:700;margin-bottom:8px;letter-spacing:-.02em}
.lead{color:var(--muted);font-size:.95rem;margin-bottom:32px}

.support-box{
  border:1px solid var(--border);background:var(--ghost);border-radius:var(--radius-sm);
  padding:20px;margin-bottom:28px;text-align:left;
}
.support-box .label{font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.support-box a{font-weight:600;font-size:1rem}

.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.row{grid-template-columns:1fr}}

.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:.82rem;font-weight:500;color:var(--muted);margin-bottom:5px}
.field input,.field textarea{
  width:100%;padding:12px 14px;font-family:inherit;font-size:.92rem;color:var(--text);
  background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--radius-sm);
  outline:none;transition:border-color var(--transition),box-shadow var(--transition);
}
.field input:focus,.field textarea:focus{
  border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-dim);
}
.field textarea{min-height:120px;resize:vertical}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 28px;border-radius:var(--radius-pill);font-family:inherit;font-size:.92rem;
  font-weight:600;cursor:pointer;transition:all var(--transition);border:none;text-decoration:none;
}
.btn.primary{background:var(--accent);color:#000}
.btn.primary:hover{box-shadow:0 6px 24px rgba(198,242,33,.3);transform:translateY(-2px)}
.btn.ghost{background:var(--ghost);border:1px solid var(--border);color:var(--text)}
.btn.ghost:hover{background:rgba(255,255,255,.12)}

.actions{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.btn.primary.full{width:100%;margin-top:6px}

#status{margin-top:16px;font-size:.88rem;min-height:1.4em}
#status.good{color:var(--accent)}
#status.bad{color:#ff6b6b}

footer{margin-top:36px;padding-top:24px;border-top:1px solid var(--border-light);font-size:.78rem;color:var(--muted)}
footer nav{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
footer nav a{color:var(--muted);font-weight:500}
footer nav a:hover{color:var(--text)}
</style>
</head>
<body>
<div class="card">
  <img src="../assets/outsiide-logo.png" alt="OUTSIIDE" class="logo">
  <h1>Support</h1>
  <p class="lead">Need help? Email us directly or send your feedback below.</p>

  <div class="support-box">
    <div class="label">Contact</div>
    <a href="mailto:info@outsiide.ca">info@outsiide.ca</a>
  </div>

  <form id="supportForm">
    <div class="row">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@email.com">
      </div>
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" required placeholder="How can we help?"></textarea>
    </div>
    <button type="submit" class="btn primary full">Send Message</button>
    <div id="status"></div>
    <div class="actions">
      <a href="../" class="btn ghost">← Back Home</a>
    </div>
  </form>

  <footer>
    <nav>
      <a href="../">Home</a>
      <a href="../privacy/">Privacy Policy</a>
      <a href="../terms/">Terms of Service</a>
      <a href="../conditions/">Conditions of Use</a>
    </nav>
    <span>&copy; <script>document.write(new Date().getFullYear())</script> OUTSIIDE. All rights reserved.</span>
  </footer>
</div>

<script>
document.getElementById('supportForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const status=document.getElementById('status');
  const btn=this.querySelector('button[type="submit"]');
  btn.disabled=true;btn.textContent='Sending…';
  status.className='';status.textContent='';
  try{
    const res=await fetch('https://formspree.io/f/mzdddzgj',{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({
        name:this.name.value,
        email:this.email.value,
        message:this.message.value,
        source:'OUTSIIDE Support Page',
        timestamp:new Date().toISOString()
      })
    });
    if(res.ok){
      status.className='good';status.textContent='Message sent — we\'ll get back to you soon!';
      this.reset();
    }else{
      throw new Error('Send failed');
    }
  }catch(err){
    status.className='bad';status.textContent='Something went wrong. Please email us directly.';
  }finally{
    btn.disabled=false;btn.textContent='Send Message';
  }
});
</script>
</body>
</html>
