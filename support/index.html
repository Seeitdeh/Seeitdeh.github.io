<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OUTSIIDE Support</title>
  <meta name="description" content="Need help with OUTSIIDE? Contact us or send your feedback." />
  <meta name="robots" content="index,follow" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --text: #f5f5f5;
      --muted: rgba(245,245,245,.68);
      --card: rgba(255,255,255,.06);
      --panel: rgba(0,0,0,.30);
      --border: rgba(255,255,255,.10);
      --border-light: rgba(255,255,255,.06);
      --input-bg: rgba(255,255,255,.08);
      --input-border: rgba(255,255,255,.16);
      --button: #ffffff;
      --buttonText: #000000;
      --ghost: rgba(255,255,255,.07);
      --accent: #8cffb4;
      --accent-dim: rgba(140,255,180,.15);
      --accent-border: rgba(140,255,180,.30);
      --good: #8cffb4;
      --bad: #ff8c8c;
      --radius-sm: 14px;
      --radius-md: 22px;
      --radius-lg: 28px;
      --radius-pill: 999px;
      --shadow-card: 0 24px 64px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
      --transition: 200ms cubic-bezier(.4,0,.2,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background:
        linear-gradient(rgba(0,0,0,.58), rgba(0,0,0,.72)),
        url("../assets/outsiide-bg.jpg") center / cover no-repeat,
        var(--bg);
      animation: slowZoom 40s ease-in-out infinite alternate;
    }

    @keyframes slowZoom {
      from { background-size: auto, 100% auto, auto; }
      to   { background-size: auto, 108% auto, auto; }
    }

    .wrap {
      width: min(980px, 100%);
      display: flex;
      justify-content: center;
    }

    .card {
      width: min(820px, 100%);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-card);
    }

    .top {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      width: min(280px, 70vw);
      height: auto;
      display: block;
      margin: 0 auto 16px;
      filter: drop-shadow(0 16px 24px rgba(0,0,0,.5));
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3.4vw, 36px);
      font-weight: 900;
      letter-spacing: -.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .supportBox {
      margin-top: 26px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--panel);
      transition: border-color var(--transition);
    }

    .supportBox:hover {
      border-color: var(--accent-border);
    }

    .supportBox h2 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--accent);
    }

    .supportBox a {
      color: var(--text);
      text-decoration: none;
      transition: color var(--transition);
    }

    .supportBox a:hover { color: var(--accent); }

    form {
      margin-top: 24px;
      display: grid;
      gap: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      font: inherit;
      font-size: 15px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input:focus, textarea:focus {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(245,245,245,.40);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: var(--radius-pill);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -.01em;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .btn:hover { transform: translateY(-2px); }

    .btn.primary {
      background: var(--button);
      color: var(--buttonText);
    }

    .btn.primary:hover {
      box-shadow: 0 8px 28px rgba(255,255,255,.15);
    }

    .btn.ghost {
      background: var(--ghost);
      color: var(--text);
      border-color: var(--border);
    }

    .btn.ghost:hover {
      background: rgba(255,255,255,.12);
    }

    .msg {
      margin-top: 8px;
      font-size: 13px;
      min-height: 18px;
      color: var(--muted);
    }

    .msg.good { color: var(--good); }
    .msg.bad { color: var(--bad); }

    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border-light);
      text-align: center;
      font-size: 13px;
      color: rgba(245,245,245,.45);
    }

    .footer a {
      color: rgba(245,245,245,.75);
      text-decoration: none;
      margin: 0 8px;
      transition: color var(--transition);
    }

    .footer a:hover { color: var(--accent); }

    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 28px 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
      .btn:hover { transform: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card">
      <div class="top">
        <img class="logo" src="../assets/outsiide-logo.png" alt="OUTSIIDE logo" />
        <h1>Support</h1>
        <p>Need help with OUTSIIDE? Email us directly or send your feedback below.</p>
      </div>

      <section class="supportBox">
        <h2>Contact</h2>
        <p>
          Email us at
          <a href="mailto:info@outsiide.ca">info@outsiide.ca</a>
        </p>
      </section>

      <form id="feedbackForm">
        <div class="row">
          <input
            id="name"
            type="text"
            name="name"
            placeholder="Your name"
            autocomplete="name"
            required
          />
          <input
            id="email"
            type="email"
            name="email"
            placeholder="Your email"
            autocomplete="email"
            required
          />
        </div>

        <textarea
          id="message"
          name="message"
          placeholder="Tell us what you think, what needs fixing, or what you'd like to see next."
          required
        ></textarea>

        <div class="actions">
          <button class="btn primary" id="btn" type="submit">Send Feedback</button>
          <a class="btn ghost" href="/">Back Home</a>
        </div>

        <div id="msg" class="msg" role="status" aria-live="polite"></div>
      </form>

      <div class="footer">
        <a href="/">Home</a>
        <a href="/privacy/">Privacy Policy</a>
        <a href="/terms/">Terms of Service</a>
        <a href="/conditions/">Conditions of Use</a>
        <br />
        &copy; <span id="y"></span> OUTSIIDE
      </div>
    </main>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    const FORMSPREE_URL = "https://formspree.io/f/mzdddzgj";

    const form = document.getElementById("feedbackForm");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      msg.textContent = "";
      msg.className = "msg";
      btn.disabled = true;

      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        message: document.getElementById("message").value.trim(),
        source: "outsiide.ca/support",
        timestamp: new Date().toISOString()
      };

      try {
        const res = await fetch(FORMSPREE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          form.reset();
          msg.textContent = "Thanks — your feedback has been sent.";
          msg.classList.add("good");
        } else {
          msg.textContent = "Could not submit right now. Please try again.";
          msg.classList.add("bad");
        }
      } catch (err) {
        msg.textContent = "Network error. Please try again.";
        msg.classList.add("bad");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
